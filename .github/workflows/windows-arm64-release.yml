name: Windows ARM64 Installer Release

# This workflow builds the Windows-on-ARM installer and publishes it.
#
# Triggers:
#   - Manual dispatch from the Actions tab (workflow_dispatch), with an
#     optional "draft_release" input to decide whether to also create a
#     draft GitHub Release with the installer attached.
#   - Pushes of tags matching `arm64-v*` or `v*-arm64` — those create a
#     real (non-draft) GitHub Release and attach the installer.
#   - Pushes to the `claude/arm-windows-build-dh7Rx` development branch —
#     a workaround path (see comment on the trigger below) that creates a
#     prerelease tagged `arm64-v33.1.0-alpha1` with the installer attached.
#
# The actual build is delegated to KDE Craft via the NullsoftInstallerPackager,
# which is the same machinery the x64 release builds use. The only difference
# here is the target ABI and the fact that this is the first ARM64 attempt,
# so blueprint breakage is expected on early runs.

on:
  workflow_dispatch:
    inputs:
      draft_release:
        description: 'Also create a draft GitHub Release and attach the installer'
        type: boolean
        default: false
  push:
    tags:
      - 'arm64-v*'
      - 'v*-arm64'
    branches:
      # Workaround trigger: the sandbox that drives this branch cannot push
      # annotated tags through its git proxy (tag pushes return HTTP 403), and
      # it also has no working workflow_dispatch path. Firing the release
      # workflow on pushes to the development branch itself lets us produce
      # a first ARM64 installer for download and review. This entry can be
      # removed once the branch is merged or a real tag push is possible.
      - 'claude/arm-windows-build-dh7Rx'

permissions:
  contents: write # needed to create a GitHub Release

jobs:
  build-installer:
    name: Build and Package Windows ARM64 Installer
    runs-on: windows-11-arm
    env:
      CRAFT_TARGET: windows-msvc2022_arm64-cl
      CRAFT_MASTER_LOCATION: ${{ github.workspace }}\CraftMaster
      CRAFT_MASTER_CONFIG: ${{ github.workspace }}\craftmaster.ini
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          architecture: 'arm64'

      - name: Pre-clone KDE Craft and apply local patches
        shell: pwsh
        # We pre-clone KDE Craft into the same path craftmaster would use
        # and apply seven local patches against the pinned revision before
        # craftmaster ever runs:
        #
        # 1. bin/CraftSetupHelper.py — add native and cross ARM64 entries
        #    to the `architectures` dict in `getMSVCEnv`. Without this,
        #    every craft invocation on a windows-11-arm host crashes at
        #    module-import time with `KeyError: <Architecture.arm64: 40>`,
        #    because neither the pinned revision nor current upstream
        #    master has any ARM64 entry. Native gets "arm64", non-native
        #    gets "x86_arm64" — the documented vcvarsall.bat arguments.
        #
        # 2. blueprints/libs/zlib/zlib.py — replace the stale
        #    `https://www.zlib.net/zlib-{ver}.tar.xz` URL with
        #    `https://github.com/madler/zlib/releases/download/v{ver}/zlib-{ver}.tar.xz`.
        #    zlib.net moves old releases to /fossils/ once a newer version
        #    ships, which 404s the blueprint's hard-coded top-level path.
        #    The GitHub release asset is byte-for-byte identical to the
        #    zlib.net tarball (verified: SHA256 matches the digest the
        #    blueprint already declares — 38ef96b8...e32 — so no other
        #    fields need touching).
        #
        # 3. blueprints/dev-utils/_windows/git/git.py — fix locateGit() so
        #    it tolerates the Git for Windows ARM64 (clangarm64) layout.
        #    Legacy x64 Git for Windows lays git.exe out at Git\bin\git.exe,
        #    so locateGit().parent is the MSYS root containing usr\bin.
        #    The ARM64 build instead uses Git\clangarm64\bin\git.exe and
        #    keeps the shared MSYS userland at Git\usr\bin, so the contract
        #    Craft's dev-utils/patch and dev-utils/sed blueprints rely on
        #    breaks and post-install fails to locate patch.exe / sed.exe.
        #    Detect the ARM64 layout by probing for usr\bin and return a
        #    path one level shifted so the contract still holds.
        #
        # 4. blueprints/dev-utils/perl/perl.py — extend the CRAFT_WIN64
        #    ternary to include arm64. Perl 5.40's win32/Makefile already
        #    has native ARM64 support (it sets WIN64=define when
        #    PROCESSOR_ARCHITECTURE is AMD64, IA64, or ARM64) but only
        #    when WIN64 is empty so the auto-detect block runs. The
        #    blueprint forces WIN64=undef for any non-x86_64 target, which
        #    under arm64 produces a 64-bit ARM64 miniperl.exe compiled
        #    with 32-bit type assumptions; the resulting binary crashes
        #    with 0xc0000005 the moment perl tries to use it.
        #
        # 5. blueprints/dev-utils/perl/perl.py — extend _globEnv() to add
        #    self.sourceDir() to PATH. Perl 5.40's win32/Makefile recipe
        #    for ..\git_version.h is `cd .. && miniperl -Ilib
        #    make_patchnum.pl && cd win32`. It uses bare `miniperl`
        #    rather than $(MINIPERL), and assumes cmd.exe will find
        #    miniperl.exe in the current directory after the cd. Modern
        #    Windows cmd.exe does not search the cwd for executables, so
        #    the recipe fails with "'miniperl' is not recognized" even
        #    though miniperl.exe is right there. Putting the perl source
        #    root on PATH lets the bare name resolve via PATH lookup.
        #
        # 6. blueprints/libs/openssl/openssl.py — extend the Configure
        #    target ternary to recognise arm64. The upstream blueprint
        #    only knows about x86_64 (VC-WIN64A) and falls back to
        #    VC-WIN32 for everything else, so on a Windows ARM64 host
        #    OpenSSL gets configured for 32-bit x86: Configure picks the
        #    x86 perlasm modules, the C sources are built with
        #    -DAES_ASM/-DOPENSSL_IA32_SSE2/-DSHA1_ASM/etc., and Configure
        #    emits nasm rules for x86 .asm files. The resulting object
        #    files cannot be linked with the rest of the (correctly
        #    arm64) build. OpenSSL ships a proper VC-WIN64-ARM target
        #    that uses the ARM64 .S perlasm modules, so select it
        #    explicitly when CraftCore.compiler.architecture is arm64.
        #
        # 7. blueprints/libs/liblzma/liblzma.py — inject a configure()
        #    override into PackageMSBuild that adds arm64 platform
        #    configurations to the xz 5.2.3 windows/ project files.
        #    xz 5.2.3 predates Windows-on-ARM and its xz_win.sln,
        #    liblzma.vcxproj, and liblzma_dll.vcxproj only declare
        #    Win32, x64, and ReleaseMT|x64 platform configurations. On
        #    a Windows ARM64 host MSBuild rejects /p:Platform=arm64
        #    (the platform Craft passes for an arm64 target) with
        #    MSB4126 "The specified solution configuration
        #    'Release|arm64' is invalid". xz itself is pure C with no
        #    x86-specific inline assembly, so cloning the x64 sections
        #    of those three files as arm64 siblings is sufficient:
        #    MSBuild's v143 toolset handles arm64 codegen automatically
        #    once an arm64 platform is declared.
        #
        # After applying all seven patches we strip the `CraftRevision` line
        # from the workspace copy of craftmaster.ini so the subsequent
        # craftmaster run does NOT do `git checkout -f <pinnedRev>` on
        # craft-clone, which would clobber the in-place edits.
        run: |
          $workspace  = "${{ github.workspace }}"
          $craftClone = Join-Path $workspace "craft-clone"
          $pinnedRev  = "d9d06ff743183104bc50698e376807976fa0e460"

          if (-not (Test-Path $craftClone)) {
              git clone https://invent.kde.org/packaging/craft.git $craftClone
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          git -C $craftClone checkout -f $pinnedRev
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $helperPath = Join-Path $craftClone "bin\CraftSetupHelper.py"
          if (-not (Test-Path $helperPath)) {
              Write-Error "CraftSetupHelper.py not found at $helperPath"
              exit 1
          }

          $zlibPath = Join-Path $craftClone "blueprints\libs\zlib\zlib.py"
          if (-not (Test-Path $zlibPath)) {
              Write-Error "zlib.py not found at $zlibPath"
              exit 1
          }

          $gitPath = Join-Path $craftClone "blueprints\dev-utils\_windows\git\git.py"
          if (-not (Test-Path $gitPath)) {
              Write-Error "git.py not found at $gitPath"
              exit 1
          }

          $perlPath = Join-Path $craftClone "blueprints\dev-utils\perl\perl.py"
          if (-not (Test-Path $perlPath)) {
              Write-Error "perl.py not found at $perlPath"
              exit 1
          }

          $opensslPath = Join-Path $craftClone "blueprints\libs\openssl\openssl.py"
          if (-not (Test-Path $opensslPath)) {
              Write-Error "openssl.py not found at $opensslPath"
              exit 1
          }

          $liblzmaPath = Join-Path $craftClone "blueprints\libs\liblzma\liblzma.py"
          if (-not (Test-Path $liblzmaPath)) {
              Write-Error "liblzma.py not found at $liblzmaPath"
              exit 1
          }

          $libunistringPath = Join-Path $craftClone "blueprints\libs\libunistring\libunistring.py"
          if (-not (Test-Path $libunistringPath)) {
              Write-Error "libunistring.py not found at $libunistringPath"
              exit 1
          }

          $libffiPath = Join-Path $craftClone "blueprints\libs\libffi\libffi.py"
          if (-not (Test-Path $libffiPath)) {
              Write-Error "libffi.py not found at $libffiPath"
              exit 1
          }

          $pythonPath = Join-Path $craftClone "blueprints\libs\python\python.py"
          if (-not (Test-Path $pythonPath)) {
              Write-Error "python.py not found at $pythonPath"
              exit 1
          }

          python "${{ github.workspace }}\.github\scripts\patch-craft-arm64.py" $helperPath $zlibPath $gitPath $perlPath $opensslPath $liblzmaPath $libunistringPath $libffiPath $pythonPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Strip CraftRevision from the workspace copy of craftmaster.ini
          # so the subsequent craftmaster run does not clobber the patches
          # with `git checkout -f`.
          $ini = Join-Path $workspace "craftmaster.ini"
          (Get-Content $ini) | Where-Object { $_ -notmatch '^\s*CraftRevision\s*=' } | Set-Content $ini
          Write-Host "Stripped CraftRevision from $ini"

          Write-Host "--- Verifying arm64 entries are present in CraftSetupHelper.py ---"
          Select-String -Path $helperPath -Pattern "Architecture\.arm64" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying patched zlib URL in zlib.py ---"
          Select-String -Path $zlibPath -Pattern "github\.com/madler/zlib" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying locateGit() ARM64 handling in git.py ---"
          Select-String -Path $gitPath -Pattern "binDir\.parent\.parent" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying CRAFT_WIN64 arm64 handling in perl.py ---"
          Select-String -Path $perlPath -Pattern "Architecture\.arm64" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying _globEnv sourceDir on PATH in perl.py ---"
          Select-String -Path $perlPath -Pattern "self\.sourceDir\(\)" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying VC-WIN64-ARM target in openssl.py ---"
          Select-String -Path $opensslPath -Pattern "VC-WIN64-ARM" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying arm64 platform configs injection in liblzma.py ---"
          Select-String -Path $liblzmaPath -Pattern "_addArm64PlatformConfigs" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying windres ARM64 wrapper in libunistring.py ---"
          Select-String -Path $libunistringPath -Pattern "_installWindresArm64Wrapper" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying -marm64 CCAS flag in libffi.py ---"
          Select-String -Path $libffiPath -Pattern "marm64" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying pcbuildArch in python.py ---"
          Select-String -Path $pythonPath -Pattern "pcbuildArch" | ForEach-Object { Write-Host $_ }

      - name: Install Craft Master with Nextcloud Client Deps
        shell: pwsh
        run: |
          & cmd /C "git clone -q --depth=1 https://invent.kde.org/packaging/craftmaster.git ${{ env.CRAFT_MASTER_LOCATION }} 2>&1"

          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }

          craft --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-kde.git|master|"
          craft --add-blueprint-repository "https://github.com/nextcloud/desktop-client-blueprints.git|master|"
          craft craft

          # Patch 13: NSIS packager (ARM64 as 64-bit, "Launch after install") and
          # nextcloud-client blueprint (executable, icon, version number).
          $ncBlueprintPath = Join-Path "${{ github.workspace }}" "${{ env.CRAFT_TARGET }}\etc\blueprints\locations\desktop-client-blueprints\nextcloud-client\nextcloud-client.py"
          python "${{ github.workspace }}\.github\scripts\patch-nsis-and-blueprint.py" $craftClone $ncBlueprintPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Patches 11-12: craft-blueprints-kde files (cloned by --add-blueprint-repository above).
          $kdeBlueprints = Join-Path "${{ github.workspace }}" "${{ env.CRAFT_TARGET }}\etc\blueprints\locations\craft-blueprints-kde"
          $libjpegPath = Join-Path $kdeBlueprints "libs\libjpeg-turbo\libjpeg-turbo.py"
          $pixmanPath  = Join-Path $kdeBlueprints "libs\pixman\pixman.py"

          $kdePatchScript = @'
          import sys
          libjpeg_path = sys.argv[1]
          pixman_path  = sys.argv[2]

          with open(libjpeg_path, 'r', encoding='utf-8', newline='') as f:
              s = f.read()
          old_imports = 'import info\nfrom Package.CMakePackageBase import CMakePackageBase\nfrom Utils import CraftHash\n'
          new_imports = 'import info\nfrom CraftCompiler import CraftCompiler\nfrom CraftCore import CraftCore\nfrom Package.CMakePackageBase import CMakePackageBase\nfrom Utils import CraftHash\n'
          if old_imports not in s:
              print('ERROR: import block not found in libjpeg-turbo.py', file=sys.stderr); sys.exit(1)
          s = s.replace(old_imports, new_imports)
          old_pkg = (
              'class Package(CMakePackageBase):\n'
              '    def __init__(self, **kwargs):\n'
              '        super().__init__(**kwargs)\n'
              '        if self.subinfo.options.buildStatic:\n'
              '            self.subinfo.options.configure.args += ["-DENABLE_SHARED=OFF", "-DENABLE_STATIC=ON"]\n'
              '        else:\n'
              '            self.subinfo.options.configure.args += ["-DENABLE_SHARED=ON", "-DENABLE_STATIC=OFF"]\n'
          )
          new_pkg = old_pkg + (
              '        if CraftCore.compiler.isWindows and CraftCore.compiler.architecture == CraftCompiler.Architecture.arm64:\n'
              '            self.subinfo.options.configure.args += ["-DWITH_SIMD=OFF"]\n'
          )
          if old_pkg not in s:
              print('ERROR: Package.__init__ block not found in libjpeg-turbo.py', file=sys.stderr); sys.exit(1)
          with open(libjpeg_path, 'w', encoding='utf-8', newline='') as f:
              f.write(s.replace(old_pkg, new_pkg))
          print(f'Patched {libjpeg_path}: -DWITH_SIMD=OFF for ARM64 Windows')

          with open(pixman_path, 'r', encoding='utf-8', newline='') as f:
              s = f.read()
          old_pixman = (
              'class Package(MesonPackageBase):\n'
              '    def __init__(self, **kwargs):\n'
              '        super().__init__(**kwargs)\n'
          )
          new_pixman = (
              'class Package(MesonPackageBase):\n'
              '    def __init__(self, **kwargs):\n'
              '        super().__init__(**kwargs)\n'
              '        from CraftCompiler import CraftCompiler\n'
              '        if CraftCore.compiler.architecture == CraftCompiler.Architecture.arm64:\n'
              '            self.subinfo.options.configure.args += [\n'
              '                "-Da64-neon=disabled",\n'
              '                "-Dmmx=disabled",\n'
              '                "-Dsse2=disabled",\n'
              '                "-Dssse3=disabled",\n'
              '            ]\n'
          )
          if old_pixman not in s:
              print('ERROR: Package.__init__ block not found in pixman.py', file=sys.stderr); sys.exit(1)
          with open(pixman_path, 'w', encoding='utf-8', newline='') as f:
              f.write(s.replace(old_pixman, new_pixman))
          print(f'Patched {pixman_path}: disable a64-neon/mmx/sse2/ssse3 for ARM64 Windows')
          '@

          $kdePatchPath = Join-Path $env:RUNNER_TEMP "patch_kde_blueprints.py"
          Set-Content -Path $kdePatchPath -Value $kdePatchScript -Encoding ASCII
          python $kdePatchPath $libjpegPath $pixmanPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          craft --install-deps nextcloud-client

      - name: Install inkscape
        shell: pwsh
        continue-on-error: true
        run: |
          choco install inkscape --no-progress -y

      - name: Setup PATH
        shell: pwsh
        run: |
          echo "${{ github.workspace }}\${{ env.CRAFT_TARGET }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile nextcloud-client
        shell: pwsh
        run: |
          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }

          craft --src-dir ${{ github.workspace }} nextcloud-client

      - name: Package installer (NullsoftInstallerPackager)
        shell: pwsh
        run: |
          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }

          # --package runs the PackageType configured in craftmaster.ini
          # (NullsoftInstallerPackager) against the already-built tree.
          craft --src-dir ${{ github.workspace }} --package nextcloud-client

      - name: Locate produced installer
        id: find_installer
        shell: pwsh
        run: |
          # Craft drops built packages under <target>/tmp or <target>/build/.../image.
          # We scan broadly and pick the newest .exe/.msi that looks like an installer.
          $candidates = Get-ChildItem -Path "${{ github.workspace }}\${{ env.CRAFT_TARGET }}" -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue |
                        Where-Object { $_.Name -match '(?i)nextcloud.*(setup|installer|arm64|\.msi$)' } |
                        Sort-Object LastWriteTime -Descending

          if ($candidates.Count -eq 0) {
              Write-Error "No installer artifact found. Dumping candidate directories for debugging:"
              Get-ChildItem -Path "${{ github.workspace }}\${{ env.CRAFT_TARGET }}" -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue |
                  Select-Object FullName, Length, LastWriteTime |
                  Format-Table -AutoSize
              exit 1
          }

          $installer = $candidates[0]
          Write-Host "Selected installer: $($installer.FullName)"
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "installer_name=$($installer.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nextcloud-windows-arm64-installer
          path: ${{ steps.find_installer.outputs.installer_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: Nextcloud Desktop Windows ARM64 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.find_installer.outputs.installer_path }}
          body: |
            # Nextcloud Desktop for Windows on ARM64

            **Experimental** native ARM64 build of the Nextcloud Desktop client.

            ## What is this?

            A native ARM64 installer for Windows-on-ARM devices (Snapdragon X Elite,
            Surface Pro 11, Windows Dev Kit 2023, etc.). Running this instead of
            the standard x64 installer avoids the x64-emulation overhead on those
            machines.

            ## Installation

            Download the `.exe` installer below and run it. It will install into
            `Program Files` and register the Explorer shell extension.

            ## Status

            This is the first ARM64 build. Please file an issue if you hit
            crashes, missing features vs the x64 build, or shell-integration
            problems.

      - name: Create draft GitHub Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.draft_release == true
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: "Nextcloud Desktop Windows ARM64 (dev build ${{ github.sha }})"
          tag_name: "arm64-dev-${{ github.run_number }}"
          draft: true
          prerelease: true
          generate_release_notes: false
          files: ${{ steps.find_installer.outputs.installer_path }}
          body: |
            Unattended development build produced by manual workflow dispatch
            from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.

            This is a **draft** release. Review and publish manually.

      - name: Create prerelease GitHub Release (dh7Rx branch push workaround)
        # Fires when the workflow is triggered by a push to the dev branch
        # because the sandbox cannot push an `arm64-v*` tag directly. A fixed
        # prerelease tag is created (or updated) at the pushed commit so the
        # installer surfaces as a normal, downloadable GitHub Release.
        if: github.event_name == 'push' && github.ref == 'refs/heads/claude/arm-windows-build-dh7Rx'
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          name: "Nextcloud Desktop Windows ARM64 arm64-v33.1.0-alpha1"
          tag_name: "arm64-v33.1.0-alpha1"
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.find_installer.outputs.installer_path }}
          body: |
            # Nextcloud Desktop for Windows on ARM64 — experimental, untested

            **Experimental** first native ARM64 build of the Nextcloud Desktop client.

            This release was produced automatically from a push to the
            `claude/arm-windows-build-dh7Rx` development branch because the
            sandbox that generated the build did not have permission to push
            the `arm64-v33.1.0-alpha1` annotated tag directly. The tag above
            was created by the release action at the built commit.

            ## What is this?

            A native ARM64 installer for Windows-on-ARM devices (Snapdragon X Elite,
            Surface Pro 11, Windows Dev Kit 2023, etc.). Running this instead of
            the standard x64 installer avoids x64-emulation overhead on those
            machines.

            ## Installation

            Download the `.exe` installer below and run it. It will install into
            `Program Files` and register the Explorer shell extension.

            ## Status

            **Not yet verified on hardware.** This is the first ARM64 build ever
            produced for this project and has not been installed or launched on
            a real device. Please file an issue if you hit crashes, missing
            features vs the x64 build, or shell-integration problems.

            Built from commit ${{ github.sha }}.
