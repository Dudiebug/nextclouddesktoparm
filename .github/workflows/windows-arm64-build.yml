name: Windows ARM64 Build and Test
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Windows ARM64 Build and Test
    runs-on: windows-11-arm
    env:
      CRAFT_TARGET: windows-msvc2022_arm64-cl
      CRAFT_MASTER_LOCATION: ${{ github.workspace }}\CraftMaster
      CRAFT_MASTER_CONFIG: ${{ github.workspace }}\craftmaster.ini
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          architecture: 'arm64'

      - name: Pre-clone KDE Craft and apply local patches
        shell: pwsh
        # See windows-arm64-release.yml for the full explanation. In short:
        # we pre-clone Craft into the path craftmaster would use, then patch
        # four files before craftmaster runs:
        #   1. bin/CraftSetupHelper.py — add ARM64 entries to the
        #      architectures dict in getMSVCEnv (otherwise craft crashes
        #      at import time on a windows-11-arm host with
        #      `KeyError: <Architecture.arm64: 40>`).
        #   2. blueprints/libs/zlib/zlib.py — replace the dead
        #      `https://www.zlib.net/zlib-{ver}.tar.xz` URL with the
        #      equivalent GitHub release asset (same SHA256).
        #   3. blueprints/dev-utils/_windows/git/git.py — fix locateGit()
        #      to tolerate the Git for Windows ARM64 (clangarm64) layout
        #      so dev-utils/patch and dev-utils/sed can find their
        #      shared MSYS userland.
        #   4. blueprints/dev-utils/perl/perl.py — extend the CRAFT_WIN64
        #      ternary to include arm64 so Perl 5.40's win32/Makefile
        #      auto-detects the 64-bit ARM64 build instead of producing
        #      a pointer-truncated miniperl.exe that crashes 0xc0000005.
        # Then strip CraftRevision from the workspace copy of
        # craftmaster.ini so the subsequent craftmaster run does not
        # clobber the patches with `git checkout -f`.
        run: |
          $workspace  = "${{ github.workspace }}"
          $craftClone = Join-Path $workspace "craft-clone"
          $pinnedRev  = "d9d06ff743183104bc50698e376807976fa0e460"

          if (-not (Test-Path $craftClone)) {
              git clone https://invent.kde.org/packaging/craft.git $craftClone
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          git -C $craftClone checkout -f $pinnedRev
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $helperPath = Join-Path $craftClone "bin\CraftSetupHelper.py"
          if (-not (Test-Path $helperPath)) {
              Write-Error "CraftSetupHelper.py not found at $helperPath"
              exit 1
          }

          $zlibPath = Join-Path $craftClone "blueprints\libs\zlib\zlib.py"
          if (-not (Test-Path $zlibPath)) {
              Write-Error "zlib.py not found at $zlibPath"
              exit 1
          }

          $gitPath = Join-Path $craftClone "blueprints\dev-utils\_windows\git\git.py"
          if (-not (Test-Path $gitPath)) {
              Write-Error "git.py not found at $gitPath"
              exit 1
          }

          $perlPath = Join-Path $craftClone "blueprints\dev-utils\perl\perl.py"
          if (-not (Test-Path $perlPath)) {
              Write-Error "perl.py not found at $perlPath"
              exit 1
          }

          $patchScript = @'
          import sys, re
          helper_path = sys.argv[1]
          zlib_path   = sys.argv[2]
          git_path    = sys.argv[3]
          perl_path   = sys.argv[4]

          # Patch 1: add ARM64 entries to the architectures dicts in
          # CraftSetupHelper.getMSVCEnv.
          with open(helper_path, 'r', encoding='utf-8', newline='') as f:
              s = f.read()
          s_new = re.sub(
              r'(CraftCore\.compiler\.Architecture\.x86_64: "amd64",\r?\n)(\s*\})',
              r'\1                CraftCore.compiler.Architecture.arm64: "arm64",\n\2',
              s, count=1,
          )
          if s_new == s:
              print('ERROR: could not patch native architectures dict', file=sys.stderr)
              sys.exit(1)
          s_new2 = re.sub(
              r'(CraftCore\.compiler\.Architecture\.x86_64: "x86_amd64",\r?\n)(\s*\})',
              r'\1                CraftCore.compiler.Architecture.arm64: "x86_arm64",\n\2',
              s_new, count=1,
          )
          if s_new2 == s_new:
              print('ERROR: could not patch non-native architectures dict', file=sys.stderr)
              sys.exit(1)
          with open(helper_path, 'w', encoding='utf-8', newline='') as f:
              f.write(s_new2)
          print(f'Patched {helper_path}: added ARM64 architecture entries')

          # Patch 2: rewrite the dead zlib.net URL in the zlib blueprint
          # to a GitHub release asset that has the same SHA256.
          with open(zlib_path, 'r', encoding='utf-8', newline='') as f:
              s = f.read()
          old = 'f"https://www.zlib.net/zlib-{ver}.tar.xz"'
          new = 'f"https://github.com/madler/zlib/releases/download/v{ver}/zlib-{ver}.tar.xz"'
          if old not in s:
              print('ERROR: could not find zlib.net URL literal in zlib.py', file=sys.stderr)
              sys.exit(1)
          with open(zlib_path, 'w', encoding='utf-8', newline='') as f:
              f.write(s.replace(old, new))
          print(f'Patched {zlib_path}: zlib.net -> github.com release asset')

          # Patch 3: dev-utils/_windows/git/git.py locateGit() — handle the
          # Git for Windows ARM64 (clangarm64) layout where git.exe lives at
          # Git\clangarm64\bin\git.exe but the shared MSYS userland stays at
          # Git\usr\bin. Without this fix, dev-utils/patch and dev-utils/sed
          # fail post-install because they look up patch.exe / sed.exe at
          # locateGit().parent / "usr/bin/X.exe", which under the new layout
          # resolves to Git\clangarm64\usr\bin\X.exe (does not exist).
          with open(git_path, 'r', encoding='utf-8', newline='') as f:
              s = f.read()
          old_block = (
              '        # check whether git is installed by the system or us\n'
              '        if (CraftCore.standardDirs.craftRoot() / "dev-utils") in gitPath.parents:\n'
              '            return CraftCore.standardDirs.craftRoot() / "dev-utils/git/bin"\n'
              '        return gitPath.parent\n'
          )
          new_block = (
              '        # check whether git is installed by the system or us\n'
              '        if (CraftCore.standardDirs.craftRoot() / "dev-utils") in gitPath.parents:\n'
              '            return CraftCore.standardDirs.craftRoot() / "dev-utils/git/bin"\n'
              '        # Downstream consumers (dev-utils/patch, dev-utils/sed) expect\n'
              '        # locateGit().parent to be the MSYS root containing usr/bin/X.exe.\n'
              '        # Legacy x64 Git for Windows lays out as Git\\bin\\git.exe so\n'
              '        # gitPath.parent = Git\\bin and (Git\\bin).parent = Git, contract\n'
              '        # holds. The Git for Windows ARM64 (clangarm64) build instead\n'
              '        # uses Git\\clangarm64\\bin\\git.exe but keeps the shared MSYS\n'
              '        # userland at Git\\usr\\bin, so .parent.parent = Git\\clangarm64\n'
              '        # and the contract breaks. Detect by looking for usr\\bin and\n'
              '        # return a path one level shifted so the contract still holds.\n'
              '        binDir = gitPath.parent\n'
              '        if (binDir.parent / "usr" / "bin").exists():\n'
              '            return binDir\n'
              '        if (binDir.parent.parent / "usr" / "bin").exists():\n'
              '            return binDir.parent.parent / "bin"\n'
              '        return binDir\n'
          )
          if old_block not in s:
              print('ERROR: could not find locateGit() block in git.py', file=sys.stderr)
              sys.exit(1)
          with open(git_path, 'w', encoding='utf-8', newline='') as f:
              f.write(s.replace(old_block, new_block))
          print(f'Patched {git_path}: locateGit() handles ARM64 Git for Windows layout')

          # Patch 4: dev-utils/perl/perl.py CRAFT_WIN64 — Perl 5.40's win32/Makefile
          # already handles ARM64 (sets WIN64=define when PROCESSOR_ARCHITECTURE is
          # AMD64, IA64, or ARM64), but only when WIN64 is empty so its auto-detect
          # block runs. The Craft blueprint forces WIN64=undef for any non-x86_64
          # target, which under arm64 produces a 64-bit ARM64 miniperl.exe compiled
          # with 32-bit type assumptions; the resulting binary crashes with
          # 0xc0000005 the moment perl tries to use it. Extend the 64-bit branch
          # to include arm64 so the Makefile can self-configure.
          with open(perl_path, 'r', encoding='utf-8', newline='') as f:
              s = f.read()
          old_perl = '"CRAFT_WIN64": "" if CraftCore.compiler.architecture == CraftCompiler.Architecture.x86_64 else "undef",'
          new_perl = '"CRAFT_WIN64": "" if CraftCore.compiler.architecture in (CraftCompiler.Architecture.x86_64, CraftCompiler.Architecture.arm64) else "undef",'
          if old_perl not in s:
              print('ERROR: could not find CRAFT_WIN64 ternary in perl.py', file=sys.stderr)
              sys.exit(1)
          with open(perl_path, 'w', encoding='utf-8', newline='') as f:
              f.write(s.replace(old_perl, new_perl))
          print(f'Patched {perl_path}: CRAFT_WIN64 empty for arm64 (lets Makefile auto-detect)')
          '@

          $patchPath = Join-Path $env:RUNNER_TEMP "patch_craft_local.py"
          Set-Content -Path $patchPath -Value $patchScript -Encoding ASCII
          python $patchPath $helperPath $zlibPath $gitPath $perlPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $ini = Join-Path $workspace "craftmaster.ini"
          (Get-Content $ini) | Where-Object { $_ -notmatch '^\s*CraftRevision\s*=' } | Set-Content $ini
          Write-Host "Stripped CraftRevision from $ini"

          Write-Host "--- Verifying arm64 entries are present in CraftSetupHelper.py ---"
          Select-String -Path $helperPath -Pattern "Architecture\.arm64" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying patched zlib URL in zlib.py ---"
          Select-String -Path $zlibPath -Pattern "github\.com/madler/zlib" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying locateGit() ARM64 handling in git.py ---"
          Select-String -Path $gitPath -Pattern "binDir\.parent\.parent" | ForEach-Object { Write-Host $_ }
          Write-Host "--- Verifying CRAFT_WIN64 arm64 handling in perl.py ---"
          Select-String -Path $perlPath -Pattern "Architecture\.arm64" | ForEach-Object { Write-Host $_ }

      - name: Install Craft Master with Nextcloud Client Deps
        shell: pwsh
        run: |
          & cmd /C "git clone -q --depth=1 https://invent.kde.org/packaging/craftmaster.git ${{ env.CRAFT_MASTER_LOCATION }} 2>&1"

          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }

          craft --add-blueprint-repository "https://github.com/nextcloud/craft-blueprints-kde.git|master|"
          craft --add-blueprint-repository "https://github.com/nextcloud/desktop-client-blueprints.git|master|"
          craft craft
          craft --install-deps nextcloud-client

      - name: Install inkscape
        shell: pwsh
        # Inkscape's chocolatey package may not have a native ARM64 build; the
        # x64 MSI runs under Windows-on-ARM emulation, which is fine for the
        # build-time icon conversion step. If install fails for any reason we
        # still want the job to proceed so we can see later failures.
        continue-on-error: true
        run: |
          choco install inkscape --no-progress -y

      - name: Setup PATH
        shell: pwsh
        run: |
          echo "${{ github.workspace }}\${{ env.CRAFT_TARGET }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compile
        shell: pwsh
        run: |
          function craft() {
              python "${{ env.CRAFT_MASTER_LOCATION }}\CraftMaster.py" --config "${{ env.CRAFT_MASTER_CONFIG }}" --target ${{ env.CRAFT_TARGET }} -c $args
              if($LASTEXITCODE -ne 0) {exit $LASTEXITCODE}
          }

          craft --src-dir ${{ github.workspace }} nextcloud-client

      - name: Run tests
        shell: pwsh
        run: |
          $buildFolder = "${{ github.workspace }}\${{ env.CRAFT_TARGET }}\build\nextcloud-client\work\build"

          cd $buildFolder

          & ctest --output-on-failure --timeout 300
