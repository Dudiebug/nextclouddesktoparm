name: Sync Upstream & Build ARM64

# Checks daily for new Nextcloud Desktop stable releases.
# When found, syncs the upstream tag and triggers the release workflow.

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force build a specific upstream tag (e.g. v3.15.0). Leave empty to auto-detect.'
        type: string
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  check-and-sync:
    name: Check upstream and trigger build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.force_version }}" ]; then
            UPSTREAM_TAG="${{ inputs.force_version }}"
            echo "Forced version: $UPSTREAM_TAG"
          else
            UPSTREAM_TAG=$(gh api repos/nextcloud/desktop/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [ -z "$UPSTREAM_TAG" ]; then
              UPSTREAM_TAG=$(gh api repos/nextcloud/desktop/tags --jq '.[0].name' 2>/dev/null || echo "")
            fi
          fi

          if [ -z "$UPSTREAM_TAG" ]; then
            echo "Could not determine upstream version"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Upstream latest: $UPSTREAM_TAG"

          ARM64_TAG="arm64-${UPSTREAM_TAG}"
          EXISTING=$(gh api "repos/${{ github.repository }}/releases/tags/${ARM64_TAG}" --jq '.tag_name' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ -z "${{ inputs.force_version }}" ]; then
            echo "ARM64 release ${ARM64_TAG} already exists — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version or force build: $UPSTREAM_TAG"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync upstream and create tag
        if: steps.check.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPSTREAM_TAG="${{ steps.check.outputs.upstream_tag }}"
          ARM64_TAG="arm64-${UPSTREAM_TAG}"

          git remote add upstream https://github.com/nextcloud/desktop.git 2>/dev/null || true
          git fetch upstream --tags

          # Create an ARM64 tag pointing at the upstream tag's commit
          COMMIT=$(git rev-list -1 "${UPSTREAM_TAG}" 2>/dev/null || echo "")
          if [ -z "$COMMIT" ]; then
            echo "Could not find commit for tag ${UPSTREAM_TAG}"
            exit 1
          fi

          git tag -f "${ARM64_TAG}" "${COMMIT}"
          git push origin "${ARM64_TAG}" --force

          echo "Created tag ${ARM64_TAG} at ${COMMIT}"
          echo "This will trigger the windows-arm64-release.yml workflow"
